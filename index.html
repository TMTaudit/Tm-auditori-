<script>
async function proxyFetch(url) {
    const proxies = [
        "https://corsproxy.io/?",
        "https://thingproxy.freeboard.io/fetch/"
    ];

    for (let i = 0; i < proxies.length; i++) {
        const fullUrl = proxies[i] + encodeURIComponent(url);
        debug("Yritetään: " + fullUrl);

        try {
            const res = await fetch(fullUrl);
            if (res.ok) {
                debug("Onnistui proxyn kautta.");
                return await res.text();
            }
            debug("HTTP virhe: " + res.status);
        }
        catch (e) {
            debug("Proxy epäonnistui: " + e);
        }
    }

    throw new Error("Kaikki proxyt epäonnistuivat (TM-sivu estää).");
}

async function startAudit() {
    debug("Audit käynnissä…");

    try {
        const listUrl =
           "https://tyomarkkinatori.fi/henkiloasiakkaat/avoimet-tyopaikat?pa=MAX_1_DAY&r=06";

        debug("Haetaan TM-lista ilman AllOriginsia…");

        const html = await proxyFetch(listUrl);

        debug("Lista haettu. Pituus: " + html.length);

        const links = [...html.matchAll(/href="(\/avoimet-tyopaikat\/[^"]+)"/g)]
            .map(m => "https://tyomarkkinatori.fi" + m[1]);

        debug("Löytyi " + links.length + " ilmoitusta");

        for (let i = 0; i < links.length; i++) {
            const jobUrl = links[i];
            debug((i+1) + "/" + links.length + ": " + jobUrl);

            await new Promise(r => setTimeout(r, 200));
        }

        debug("✔ Valmis!");
    }

    catch (err) {
        showErrorBox("VIRHE:\n" + err.message);
        debug("VIRHE: " + err.message);
    }
}
</script>
