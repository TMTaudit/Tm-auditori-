<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Audit</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

#spinner {
    display: none;
    font-size: 18px;
    margin-top: 10px;
}

#debug {
    background: #f2f2f2;
    padding: 10px;
    margin-top: 15px;
    white-space: pre-wrap;
    border-radius: 8px;
    font-size: 14px;
}
</style>
</head>

<body>

<h2>TM Audit – Proxy Edition</h2>

<input id="tmInput" placeholder="Syötä TM-osoite tähän" style="width: 100%; padding: 10px;">
<button onclick="loadTM()" style="margin-top:10px; padding:10px;">Aja audit</button>

<div id="spinner">⏳ Ladataan TM-sivua...</div>
<pre id="debug"></pre>

<script>
const proxy = "https://empty-base-14ae.mikko-hallamaa.workers.dev/?url=";

async function loadTM() {
    const input = document.getElementById("tmInput").value.trim();
    const debug = document.getElementById("debug");
    const spinner = document.getElementById("spinner");

    debug.textContent = "";
    spinner.style.display = "block";

    try {
        if (!input) {
            debug.textContent = "Syötä TM-osoite.";
            spinner.style.display = "none";
            return;
        }

        const targetUrl = proxy + encodeURIComponent(input);
        debug.textContent += "➡ Haetaan: " + targetUrl + "\n\n";

        const resp = await fetch(targetUrl);
        const text = await resp.text();

        debug.textContent += "✔ Vastaus vastaanotettu.\n";
        debug.textContent += "✔ Pituus: " + text.length + " merkkiä\n\n";

        if (text.length < 50) {
            debug.textContent += "⚠ TM palautti liian vähän dataa – mahdollisesti virhe.\n";
            return;
        }

        debug.textContent += "✔ Audit OK.\n\n---\n\n";
        debug.textContent += text;

    } catch (err) {
        debug.textContent = "🚨 VIRHE: " + err.message;
    } finally {
        spinner.style.display = "none";
    }
}
</script>

</body>
</html>
