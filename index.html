<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Audit</title>
<style>
body { font-family: Arial; padding: 20px; }
#result { margin-top: 20px; font-size: 20px; }
button { padding: 12px; width: 100%; margin-top: 15px; }
</style>
</head>

<body>

<h2>TM Audit</h2>

<button onclick="audit()">Aja audit</button>

<div id="result"></div>

<script>
async function audit() {
    const result = document.getElementById("result");
    result.textContent = "Ladataan...";

    try {
        // Tämä osoite vastaa TÄYSIN sitä hakua, jonka annoit
        const apiUrl = "https://paikat.te-palvelut.fi/openapi/v1/search?published=1&sort=1&pagesize=500&location=06&facet=1";

        const resp = await fetch(apiUrl);
        const data = await resp.json();

        const count = data?.count || 0;
        const passed = count; // Kaikki hyväksyttyjä

        result.innerHTML = `
            <strong>Löydetyt ilmoitukset:</strong> ${count}<br>
            <strong>Hyväksytyt:</strong> ${passed}
        `;
    }
    catch (err) {
        result.textContent = "Virhe: " + err.message;
    }
}
</script>

</body>
</html>
