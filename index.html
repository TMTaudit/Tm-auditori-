<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Audit</title>
<style>
body { font-family: Arial; padding: 20px; }
#result { margin-top: 20px; font-size: 20px; }
button { padding: 12px; width: 100%; margin-top: 15px; }
</style>
</head>

<body>

<h2>TM Audit</h2>

<button onclick="audit()">Aja audit</button>

<div id="result"></div>

<script>
// Sinun Cloudflare proxysi
const proxy = "https://empty-base-14ae.mikko-hallamaa.workers.dev/?url=";

// Työmarkkinatorin oikea API (vastaa 3 päivän, Pirkanmaan hakua)
const tmApiUrl =
  "https://paikat.te-palvelut.fi/open-api/v1/tyopaikat?alueet=06&vuorokausimaara=3&sivu=1&sivukoko=90";

async function audit() {
    const result = document.getElementById("result");
    result.textContent = "Ladataan...";

    try {
        // API haetaan proxyn kautta → CORS toimii
        const resp = await fetch(proxy + encodeURIComponent(tmApiUrl));
        const data = await resp.json();

        // Oikea avain: työpaikat löytyvät datan listasta
        const count = data.tyopaikat?.length || 0;
        const passed = count;

        result.innerHTML = `
            <strong>Löydetyt ilmoitukset:</strong> ${count}<br>
            <strong>Hyväksytyt:</strong> ${passed}
        `;
    }
    catch (err) {
        result.textContent = "Virhe: " + err.message;
    }
}
</script>

</body>
</html>
