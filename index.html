<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Audit</title>
<style>
body { font-family: Arial; padding: 20px; }
#result { margin-top: 20px; font-size: 20px; }
button { padding: 12px; width: 100%; margin-top: 15px; }
</style>
</head>

<body>

<h2>TM Audit</h2>

<button onclick="audit()">Aja audit</button>

<div id="result"></div>

<script>
// Työmarkkinatorin virallinen, avoin API → EI tarvitse proxya
const tmApiUrl =
  "https://api.tyomarkkinatori.fi/v1/tyopaikat?area=06&days=3&page=0&pagesize=90";

async function audit() {
    const result = document.getElementById("result");
    result.textContent = "Ladataan...";

    try {
        const resp = await fetch(tmApiUrl);
        const data = await resp.json();

        // Oikea määrä löytyy 'total' kentästä
        const count = data.total || 0;
        const passed = count;

        result.innerHTML = `
            <strong>Löydetyt ilmoitukset:</strong> ${count}<br>
            <strong>Hyväksytyt:</strong> ${passed}
        `;
    }
    catch (err) {
        result.textContent = "Virhe: " + err.message;
    }
}
</script>

</body>
</html>
