<!-- 🔥 LOADING OVERLAY + ANIMAATIO + LASKURI + AJASTIN 🔥 -->
<div id="loadingOverlay" style="
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.75);
    color: #fff;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
    font-family: Arial, sans-serif;
">
    <div class="spinner" style="
        border: 8px solid #ccc;
        border-top: 8px solid #4CAF50;
        border-radius: 50%;
        width: 70px;
        height: 70px;
        animation: spin 1s linear infinite;
        margin-bottom: 25px;
    "></div>

    <div id="loadingDynamicText" style="font-size: 22px; margin-bottom: 10px;">
        Valmistellaan tarkistusta…
    </div>

    <div id="loadingCounter" style="font-size: 18px; opacity: 0.9;">
        0 / 0 ilmoitusta
    </div>

    <div id="loadingTimer" style="font-size: 16px; margin-top: 15px; opacity: 0.8;">
        Aikaa kulunut: 0.0 s
    </div>
</div>

<style>
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>

<script>
// ----------------------------
// 🔥 LOADING UI TOIMINNOT
// ----------------------------
let timerStart = 0;
let timerInterval = null;

function showLoading() {
    document.getElementById("loadingOverlay").style.display = "flex";

    timerStart = Date.now();
    timerInterval = setInterval(() => {
        const t = ((Date.now() - timerStart) / 1000).toFixed(1);
        document.getElementById("loadingTimer").innerText = `Aikaa kulunut: ${t} s`;
    }, 100);
}

function updateLoadingText(msg) {
    document.getElementById("loadingDynamicText").innerText = msg;
}

function updateCounter(current, total) {
    document.getElementById("loadingCounter").innerText = `${current} / ${total} ilmoitusta`;
}

function hideLoading() {
    clearInterval(timerInterval);
    document.getElementById("loadingOverlay").style.display = "none";
}

// ----------------------------
// 🔥 PÄÄAUDIT -ESIMERKKI
// ----------------------------
async function startAudit() {
    showLoading();
    updateLoadingText("Haetaan työpaikkoja…");

    // 🔹 1) Haetaan listaus
    const listUrl = "https://api.allorigins.win/raw?url=https://tyomarkkinatori.fi/henkiloasiakkaat/avoimet-tyopaikat?pa=MAX_1_DAY&r=06";
    const html = await fetch(listUrl).then(r => r.text());

    // 🔹 2) Parsitaan linkit
    const links = [...html.matchAll(/href="(\/avoimet-tyopaikat\/[^"]+)"/g)]
        .map(m => "https://tyomarkkinatori.fi" + m[1]);

    const total = links.length;
    updateLoadingText("Aloitetaan ilmoitusten tarkistus…");
    updateCounter(0, total);

    // 🔹 3) Käydään läpi yksi kerrallaan
    for (let i = 0; i < total; i++) {
        updateLoadingText(`Tarkistetaan ilmoitusta…`);
        updateCounter(i + 1, total);

        // Simuloidaan sivun latausta (voit poistaa tämän)
        await new Promise(r => setTimeout(r, 200));

        // ---- Tähän tulee sinun oma tarkistuskoodi ----
        // esim:
        // const jobHtml = await fetch("https://api.allorigins.win/raw?url=" + links[i]).then(r => r.text());
        // ... regex-tarkistukset ...
        // ... tulosten tallennus ...
    }

    updateLoadingText("Valmis!");
    await new Promise(r => setTimeout(r, 500));

    hideLoading();
}

// ----------------------------
// 🔥 NAPPIPAINALLUS
// ----------------------------
document.addEventListener("DOMContentLoaded", () => {
    const btn = document.getElementById("startBtn");
    if (!btn) return;

    btn.addEventListener("click", () => startAudit());
});
</script>
