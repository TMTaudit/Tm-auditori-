<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Audit</title>
<style>
body { font-family: Arial; padding: 20px; }
#result { margin-top: 20px; font-size: 20px; }
button { padding: 12px; width: 100%; margin-top: 15px; }
</style>
</head>

<body>

<h2>TM Audit</h2>

<button onclick="audit()">Aja audit</button>

<div id="result"></div>

<script>
// Sinun Cloudflare Proxy
const proxy = "https://empty-base-14ae.mikko-hallamaa.workers.dev/?url=";

// Kiinteä API-osoite (vastaa TM:n hakua)
const tmApiUrl =
  "https://paikat.te-palvelut.fi/openapi/v1/search?ae=NOW&f=MAX_3_DAYS&p=0&ps=90&r=06";

async function audit() {
    const result = document.getElementById("result");
    result.textContent = "Ladataan...";

    try {
        // API haetaan Cloudflare Proxyn kautta -> CORS ohitettu
        const resp = await fetch(proxy + encodeURIComponent(tmApiUrl));
        const data = await resp.json();

        const count = data.count || 0;
        const passed = count;

        result.innerHTML = `
            <strong>Löydetyt ilmoitukset:</strong> ${count}<br>
            <strong>Hyväksytyt:</strong> ${passed}
        `;

    } catch (err) {
        result.textContent = "Virhe: " + err.message;
    }
}
</script>

</body>
</html>
