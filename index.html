<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM-auditori</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 1.5rem;
            background: #f5f5f5;
        }
        h1 { text-align: center; }
        button {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: #0066cc;
            color: white;
        }
        #summary, #errorsList {
            margin-top: 1.5rem;
            padding: 1rem;
            background: white;
            border-radius: 8px;
        }
        a {
            color: #0066cc;
        }
    </style>
</head>
<body>

<h1>TM‑auditori</h1>

<button id="startBtn">Käynnistä tarkistus</button>

<div id="summary" style="display:none;"></div>
<div id="errorsList" style="display:none;"></div>

<script>
const URL = "https://tyomarkkinatori.fi/henkiloasiakkaat/avoimet-tyopaikat?pa=MAX_1_DAY&r=06";

// Syrjivien ehtojen regex-säännöt
const tests = {
    "Ikävaatimus": /\b(\d{2}\s?vuotia|alle\s?\d{2}|yli\s?\d{2})\b/i,
    "Sukupuoli": /\b(mies|nainen|naishakija|mieshakija)\b/i,
    "Kansalaisuus": /\b(suomen kansalainen|vain suomalainen)\b/i,
    "Äidinkieli": /\b(äidinkielenä suomi|natiivi suomi)\b/i,
    "Arkaluontoinen tieto": /\b(kuva\s?vaaditaan|kuva mukaan|siviilisääty|syntymäaika)\b/i,
    "Rikosrekisteri": /\b(rikosrekisteri|rikosrekisteriote|luottotiedot)\b/i,
    "Terveydentila": /\b(terveydentila|hyväkuntoinen|ei sairauksia)\b/i
};

async function fetchHTML(url) {
    const response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(url));
    const data = await response.json();
    return data.contents;
}

document.getElementById("startBtn").onclick = async () => {

    document.getElementById("summary").innerHTML = "Haetaan työpaikkailmoituksia...";
    document.getElementById("summary").style.display = "block";

    // Hae listaus
    const listHTML = await fetchHTML(URL);
    const tempDiv = document.createElement("div");
    tempDiv.innerHTML = listHTML;

    // Poimi työpaikkalistaus
    const links = [...tempDiv.querySelectorAll("a[href*='/avoimet-tyopaikat/']")];

    let checked = 0;
    let errorJobs = [];

    for (let a of links) {
        const jobUrl = "https://tyomarkkinatori.fi" + a.getAttribute("href");

        try {
            const jobHTML = await fetchHTML(jobUrl);
            checked++;

            let foundErrors = [];
            for (let [name, pattern] of Object.entries(tests)) {
                if (pattern.test(jobHTML)) {
                    foundErrors.push(name);
                }
            }

            if (foundErrors.length > 0) {
                errorJobs.push({
                    url: jobUrl,
                    errors: foundErrors
                });
            }

        } catch (err) {
            console.log("Virhe haussa:", jobUrl);
        }
    }

    // Yhteenveto
    document.getElementById("summary").innerHTML =
        `<h3>Yhteenveto</h3>
         Tarkistettu ilmoituksia: <b>${checked}</b><br>
         Virheellisiä: <b>${errorJobs.length}</b>`;

    // Virhelista
    let listHTMLout = "<h3>Virheelliset ilmoitukset</h3>";

    if (errorJobs.length === 0) {
        listHTMLout += "Ei virheitä 🎉";
    } else {
        for (let item of errorJobs) {
            listHTMLout += `<p><a href="${item.url}" target="_blankitem.url}</a><br>
                            Virheet: ${item.errors.join(", ")}</p>`;
        }
    }

    document.getElementById("errorsList").innerHTML = listHTMLout;
    document.getElementById("errorsList").style.display = "block";
};
</script>
</body>
</html>
