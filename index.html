<script>
/* ================================
   🔥 TURVALLINEN FETCH 10 UUDELLEENYRITYKSELLÄ
   ================================ */
async function safeFetch(url, maxTries = 10) {
    for (let attempt = 1; attempt <= maxTries; attempt++) {

        debug(`Yhteysyritys ${attempt}/${maxTries}`);

        try {
            const response = await fetch(url, { timeout: 15000 });

            if (!response.ok) {
                debug(`HTTP VIRHE: ${response.status}`);
                if (attempt === maxTries) throw new Error("HTTP VIRHE: " + response.status);
                await new Promise(r => setTimeout(r, 1000));
                continue;
            }

            return await response.text();
        }

        catch (e) {
            debug(`Fetch epäonnistui: ${e}`);
            if (attempt === maxTries) throw e;
            await new Promise(r => setTimeout(r, 1000));
        }
    }
}

/* ================================
   🔥 UUSI startAudit (VAKAA JA TOIMII AINA)
   ================================ */
async function startAudit() {
    debug("Audit käynnistetty...");

    try {
        const listUrl =
            "https://api.allorigins.win/raw?url=" +
            encodeURIComponent("https://tyomarkkinatori.fi/henkiloasiakkaat/avoimet-tyopaikat?pa=MAX_1_DAY&r=06");

        debug("Haetaan listaa…");
        
        const html = await safeFetch(listUrl);   // 🔥 VAKAA HAKU
        
        debug("Lista ladattu onnistuneesti");

        const links = [...html.matchAll(/href="(\/avoimet-tyopaikat\/[^"]+)"/g)]
                      .map(m => "https://tyomarkkinatori.fi" + m[1]);

        debug("Löytyi " + links.length + " ilmoitusta");

        for (let i = 0; i < links.length; i++) {
            debug(`(${i+1}/${links.length}) ${links[i]}`);
            await new Promise(r => setTimeout(r, 200));
        }

        debug("✔ Valmis!");
    }

    catch (e) {
        showErrorBox("VIRHE TARKISTUKSESSA:\n" + e.message);
        debug("VIRHE: " + e.message);
    }
}
</script>
