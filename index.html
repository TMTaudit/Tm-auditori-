<script>
/* ============================
   🔥 GLOBAALI VIRHELOKITUS
   Näyttää virheen suoraan ruudulla,
   ei tarvita konsolia.
   ============================ */

window.onerror = function(message, source, lineno, colno, error) {
    let details = `
VIRHE OHJELMASSA:

${message}

Lähde: ${source}
Rivi: ${lineno}:${colno}

Tämä tuli suoraan sovelluksesta,
ei tarvitse avata konsolia.
    `;
    alert(details);
    return true; 
};

window.addEventListener("unhandledrejection", function(event) {
    let details = `
ASYNC / PROMISE -VIRHE:

${event.reason}

Ei tarvitse konsolia,
virhe näkyy tässä.
    `;
    alert(details);
});
</script>
