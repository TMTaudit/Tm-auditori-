<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM Audit</title>
<style>
body { font-family: Arial; padding: 20px; }
input, button { padding: 10px; width: 100%; margin-top: 10px; }
#result { margin-top: 20px; font-size: 18px; }
</style>
</head>

<body>

<h2>TM Audit</h2>

<input id="tmInput" placeholder="Liitä TM-osoite tähän">
<button onclick="audit()">Aja audit</button>

<div id="result"></div>

<script>
const proxy = "https://empty-base-14ae.mikko-hallamaa.workers.dev/?url=";

// Tämä on ainoa funktio — ei mitään ylimääräistä
async function audit() {
    const url = document.getElementById("tmInput").value.trim();
    const result = document.getElementById("result");
    result.textContent = "Ladataan...";

    try {
        const resp = await fetch(proxy + encodeURIComponent(url));
        const html = await resp.text();

        // Lasketaan montako työpaikkailmoitusta löytyy
        // TM-sivulla ne ovat <article> -elementtejä (vahvistettu TM-sivulta)
        const count = (html.match(/<article/gi) || []).length;

        // Tässä voit määritellä kriteerin "läpi menolle"
        // Oletetaan että kaikki löytyneet ovat “hyväksyttyjä”
        const passed = count;

        result.innerHTML = `
            <strong>Löydetyt ilmoitukset:</strong> ${count}<br>
            <strong>Hyväksytyt:</strong> ${passed}
        `;

    } catch (err) {
        result.textContent = "Virhe: " + err.message;
    }
}
</script>

</body>
</html>
